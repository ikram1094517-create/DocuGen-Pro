<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> محرر ملفات </title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 0; }

        /* شريط علوي احترافي */
        .top-nav { 
            background: white; padding: 10px 20px; display: flex; justify-content: space-between; 
            align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 1000;
        }
        .nav-right { display: flex; gap: 10px; align-items: center; }
        
        /* زر تسجيل الدخول الدائري */
        .user-auth { width: 40px; height: 40px; border-radius: 50%; overflow: hidden; border: 2px solid var(--accent); cursor: pointer; display: flex; align-items: center; justify-content: center; background: #eee; }

        /* الأزرار العلوية الصغير */
        .btn-sm { padding: 8px 15px; border-radius: 20px; border: 1px solid #ddd; background: white; cursor: pointer; font-size: 13px; transition: 0.3s; }
        .btn-sm:hover { background: #f0f0f0; }

        /* منطقة الورقة */
        .container { display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .paper { 
            width: 100%; max-width: 800px; background: white; padding: 40px; 
            min-height: 1000px; box-shadow: 0 0 20px rgba(0,0,0,0.05); position: relative;
        }

        .date-container { text-align: left; margin-bottom: 30px; font-weight: bold; }
        .text-editor { width: 100%; min-height: 300px; border: none; outline: none; font-size: 18px; line-height: 1.8; color: #333; }

        /* الجدول الأنيق */
        table { width: 100%; border-collapse: collapse; margin-top: 30px; border: 1px solid #eee; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: center; }
        th { background: #fafafa; color: #777; font-size: 14px; }
        .sig-cell { height: 40px; }

        /* أزرار الإجراءات بالأسفل */
        .bottom-actions { 
            margin-top: 30px; display: flex; gap: 10px; width: 100%; max-width: 800px; padding-bottom: 50px;
        }
        .btn-main { flex: 1; padding: 15px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }
        .btn-save { background: var(--primary); }
        .btn-download { background: var(--accent); }

        @media print { .top-nav, .bottom-actions, .delete-row { display: none !important; } }

#targetTable { transition: opacity 0.3s ease; }

    </style>
</head>
<body>


    <!-- الزر الجديد هنا -->
    <button class="btn-sm" id="toggleTableBtn" onclick="toggleTable()" style="background-color: #ffebee;">🗑️ حذف الجدول</button>
</div>


    <div class="top-nav">
        <div class="nav-right">
            <button class="btn-sm" onclick="document.getElementById('pdf-upload').click()">📂 فتح ملف</button>
            <input type="file" id="pdf-upload" style="display:none" accept=".pdf">
            <button class="btn-sm" onclick="addRow()">➕ إضافة اسم</button>
        </div>
        <div class="user-auth" title="تسجيل الدخول">
            <!-- أيقونة جوجل تظهر هنا -->
            <div id="g_id_onload" data-client_id="YOUR_ID" data-callback="onSignIn"></div>
            <div class="g_id_signin" data-type="icon" data-shape="circle"></div>
        </div>
    </div>

    <div class="container">
        <div class="paper" id="captureArea">
            <div

 <!-- سطر المكان والتاريخ الاحترافي -->
<div class="date-container" style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 20px;">
    <div>
        <span style="color: #777; font-size: 14px;">المكان: </span>
        <span contenteditable="true" style="font-weight: bold; border-bottom: 1px dashed #ccc; min-width: 60px; display: inline-block;">  </span>

    </div>
    <div>
        <span style="color: #777; font-size: 14px;">بتاريخ: </span>
        <input type="date" id="datePicker" style="border: none; font-family: inherit; font-weight: bold; color: #2c3e50; outline: none; background: transparent;">
    </div>
</div>


            <div class="text-editor" contenteditable="true">
 
الموضوع: 


            </div>

            <table id="targetTable">
                <thead>
                    <tr>
                        <th>الاسم</th>
                        <th>الصفة</th>
                        <th>التوقيع</th>
                        <th class="delete-row"></th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td contenteditable="true">الاسم</td>
                        <td contenteditable="true">عامل/طالب</td>
                        <td class="sig-cell"></td>
                        <td class="delete-row"><button onclick="this.parentElement.parentElement.remove()" style="border:none; background:none; cursor:pointer;">❌</button></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- الأزرار صارت تحت الجدول دائماً -->
        <div class="bottom-actions">
            <button class="btn-main btn-save" onclick="saveAsImage()">🖼️ حفظ كصورة</button>
            <button class="btn-main btn-download" onclick="window.print()">📄 تحميل PDF</button>
        </div>
    </div>

    <script>
        document.getElementById('datePicker').valueAsDate = new Date();

        function addRow() {
            const table = document.querySelector('#targetTable tbody');
            const row = document.createElement('tr');
            row.innerHTML = `
                <td contenteditable="true">الاسم</td>
                <td contenteditable="true">طالبة</td>
                <td class="sig-cell"></td>
                <td class="delete-row"><button onclick="this.parentElement.parentElement.remove()" style="border:none; background:none; cursor:pointer;">❌</button></td>
            `;
            table.appendChild(row);
        }
function toggleTable() {
    const table = document.getElementById('targetTable');
    const btn = document.getElementById('toggleTableBtn');
    
    if (table.style.display === 'none') {
        table.style.display = 'table';
        btn.innerText = '🗑️ حذف الجدول';
        btn.style.backgroundColor = '#ffebee'; // لون مائل للأحمر عند الحذف
    } else {
        table.style.display = 'none';
        btn.innerText = '📊 إضافة جدول';
        btn.style.backgroundColor = '#e3f2fd'; // لون مائل للأزرق عند الإضافة
    }
}



        function saveAsImage() {
            const element = document.getElementById('captureArea');
            document.querySelectorAll('.delete-row').forEach(el => el.style.visibility = 'hidden');
            html2canvas(element, { scale: 2 }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'طلب.png';
                link.href = canvas.toDataURL();
                link.click();
                document.querySelectorAll('.delete-row').forEach(el => el.style.visibility = 'visible');
            });
        }
    </script>
</body>
</html>
